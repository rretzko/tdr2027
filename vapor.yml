id: 75731
name: tdr2027
environments:
    production:
        memory: 1024
        cli-memory: 512
        cli-timeout: 900
        timeout: 30
        runtime: 'php-8.4:al2023'
        database: mfr-prod
        scheduler: true
        build:
            - 'composer install --no-dev'
            - 'php artisan event:cache'
            - 'php artisan config:cache'
            - 'npm ci && npm run build && rm -rf node_modules'
    staging:
        memory: 1024
        cli-memory: 512
        cli-timeout: 900
        timeout: 30
        runtime: 'php-8.4:al2023'
        database: mfr-staging
        scheduler: false
        build:
            - 'composer install'
            - 'php artisan event:cache'
            - 'npm ci && npm run build && rm -rf node_modules'
